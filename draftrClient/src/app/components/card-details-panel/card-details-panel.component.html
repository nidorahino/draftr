<div class="panel h-100" *ngIf="card; else empty">
  <div class="panel-body d-flex flex-column">

    <!-- Image -->
    <div class="d-flex align-items-start justify-content-center gap-3 mb-3">

<!-- Card image -->
<div class="d-flex justify-content-center mb-3">
  <div class="card-image-wrap position-relative">

    <img
      *ngIf="imageUrl"
      [src]="imageUrl"
      class="img-fluid rounded border"
      alt="card image"
      style="max-height: 420px;"
    />

    <!-- BANNED overlay -->
    <img
      *ngIf="pool?.banned"
      src="assets/icons/banned.svg"
      class="banned-overlay"
      alt="Banned"
    />

    <div *ngIf="!imageUrl" class="text-muted">No image.</div>

  </div>
</div>

    </div>

<!-- Name row -->
<div class="name-row mb-2">

  <div class="card-name">
    {{ displayName }}
  </div>

  <div class="card-archetype" *ngIf="card.archetype">
    {{ card!.archetype }}
  </div>

</div>

<!-- Description (pool-only) -->
<ng-container *ngIf="pool as p">
  <div class="details-desc border rounded p-2 small flex-grow-1 mb-2">
<!-- header row inside description -->
<div class="desc-top">
<div *ngIf="formattedTypeline" class="desc-typeline">
  {{ formattedTypeline }}
</div>

  <div class="desc-meta">
    <span class="meta-item">QTY <strong>{{ p.maxQty }}</strong></span>

    <span
      class="badge meta-badge"
      [class.text-bg-danger]="p.banned"
      [class.text-bg-secondary]="!p.banned"
    >
      {{ p.banned ? 'BANNED' : 'CUBE LEGAL' }}
    </span>
  </div>
</div>
<div class="desc-text">
  {{ cleanDesc(p.description) }}
</div>

    <div *ngIf="p.atk != null || p.def != null" class="desc-stats">
      <div class="desc-sep"></div>

      <div class="stats-line">
        <ng-container *ngIf="p.atk != null">
          ATK/ <strong>{{ p.atk }}</strong>
        </ng-container>

        <ng-container *ngIf="p.def != null; else linkStat">
          &nbsp; DEF/ <strong>{{ p.def }}</strong>
        </ng-container>

        <ng-template #linkStat>
          <ng-container *ngIf="p.level != null">
            &nbsp; LINK-<strong>{{ p.level }}</strong>
          </ng-container>
        </ng-template>
      </div>
    </div>
  </div>
  <div class="mb-2 small text-muted">
    <div *ngIf="displayId != null">ID: {{ displayId }}</div>
  </div>
</ng-container>

    <!-- Actions slot -->
    <div class="d-grid gap-2 mt-auto">
      <ng-content></ng-content>
    </div>

  </div>
</div>

<ng-template #empty>
  <div class="alert alert-secondary">Select a card to see details.</div>
</ng-template>

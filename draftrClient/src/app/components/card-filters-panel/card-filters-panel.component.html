<div class="card shadow-sm mb-3 filters-panel">
  <div class="card-body filters-panel__body">

    <!-- Top utility row -->
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
      <div class="text-muted small">
        Showing {{ showing }} of {{ total }}
        <span *ngIf="getActiveFilterCount() > 0" class="ms-1">
          • <span class="badge text-bg-light border">{{ getActiveFilterCount() }} active</span>
        </span>
      </div>

      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-sm btn-outline-secondary" (click)="reset()">
          Reset
        </button>
      </div>
    </div>

    <div>

      <!-- Mode buttons -->
<div class="filter-mode-pill mb-3" role="tablist" aria-label="Filter mode">
  <button type="button"
          class="filter-mode-pill__btn"
          [class.active]="mode === 'search'"
          (click)="mode = 'search'">
    Search
  </button>

  <button type="button"
          class="filter-mode-pill__btn"
          [class.active]="mode === 'filter'"
          (click)="mode = 'filter'">
    Filters
  </button>

  <button type="button"
          class="filter-mode-pill__btn"
          [class.active]="mode === 'sort'"
          (click)="mode = 'sort'">
    Sort
  </button>
</div>

      <!-- SEARCH -->
      <div *ngIf="mode === 'search'" class="panel-section">
        <div class="row g-2">
          <div class="col-12 col-lg-6">
            <label class="form-label mb-1">Card name</label>
            <input class="form-control"
                   [(ngModel)]="model.q"
                   (ngModelChange)="onAnyChange()"
                   placeholder="e.g. blue, dark magician..." />
          </div>
        </div>
      </div>

      <!-- FILTER -->
      <div *ngIf="mode === 'filter'" class="panel-section">
        <div class="row g-2 align-items-end">
          <div class="col-12 col-md-4">
            <label class="form-label mb-1">Frame Type</label>
            <select class="form-select"
                    [(ngModel)]="model.frameType"
                    (change)="onFrameTypeChange()">
              <option value="">Any</option>
              <option *ngFor="let ft of frameTypeOptions" [value]="ft">
                {{ formatFrameType(ft) }}
              </option>
            </select>
          </div>

          <div class="col-12 col-md-4">
            <label class="form-label mb-1">{{ getRaceLabel() }}</label>
            <select class="form-select"
                    [(ngModel)]="model.race"
                    (change)="onAnyChange()">
              <option value="">Any</option>
              <option *ngFor="let r of getRaceOptions()" [value]="r">{{ r }}</option>
            </select>
          </div>

          <div class="col-12 col-md-4" *ngIf="showMonsterOnly()">
            <label class="form-label mb-1">Attribute</label>
            <select class="form-select"
                    [(ngModel)]="model.attribute"
                    (change)="onAnyChange()">
              <option value="">Any</option>
              <option *ngFor="let a of attributeOptions" [value]="a">{{ a }}</option>
            </select>
          </div>
        </div>
      </div>

      <!-- SORT -->
      <div *ngIf="mode === 'sort'" class="panel-section">
        <div class="row g-2">
          <div class="col-6 col-md-3">
            <label class="form-label mb-1">Sort By</label>
<select class="form-select"
        [(ngModel)]="model.sortKey"
        (change)="onAnyChange()">
  <option value="name">Name</option>
  <option *ngIf="showMonsterOnly()" value="atk">ATK</option>
  <option *ngIf="showMonsterOnly()" value="def">DEF</option>
  <option *ngIf="showMonsterOnly()" value="level">Level</option>
  <option *ngFor="let opt of extraSortOptions" [value]="opt.value">
    {{ opt.label }}
  </option>
</select>
          </div>

          <div class="col-6 col-md-3">
            <label class="form-label mb-1">Direction</label>
            <select class="form-select"
                    [(ngModel)]="model.sortDir"
                    (change)="onAnyChange()">
              <option value="asc">Asc</option>
              <option value="desc">Desc</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Active summary -->
      <div *ngIf="getActiveSummary()" class="alert alert-light border py-2 px-3 mt-3 mb-0">
        <span class="small">{{ getActiveSummary() }}</span>
      </div>

    </div>
  </div>
</div>

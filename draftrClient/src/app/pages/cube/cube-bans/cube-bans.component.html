<!-- ban-list.component.html -->

<!-- Two-pane layout -->
<div *ngIf="!loading && !error" class="row g-3">

  <!-- LEFT -->
  <div class="col-12 col-lg-8">

    <app-card-browser
      title="Ban List"
      subtitle="View banned cards as a list or as images."
      [loading]="loading"
      [error]="error"
      emptyText="No banned cards."
      [items]="bannedCards"
      [(viewMode)]="viewMode"
      [(selectedId)]="selectedCardId"
      (selectedIdChange)="onBanSelectedIdChange($event)"
      [getId]="banId"
      [getName]="banName"
      [getImageUrl]="banImage"
      [getSubtext]="banSubtext"
      [getBadgeText]="banBadgeText"
      [getBadgeClass]="banBadgeClass"
      [getRowStyle]="banRowStyle"
      [showBannedIcon]="banShowBannedIcon"
    >
      <!-- no filters, no headerExtras needed here -->
    </app-card-browser>

  </div>

  <!-- RIGHT -->
  <div class="col-12 col-lg-4">
    <app-card-details-panel
      *ngIf="selected; else banEmpty"
      [card]="selected"
      title="Details"
      subtitle="Selected card"
    ></app-card-details-panel>

    <ng-template #banEmpty>
      <div class="alert alert-secondary">Select a card to see details.</div>
    </ng-template>
  </div>

</div>
